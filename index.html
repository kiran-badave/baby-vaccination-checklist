<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Baby Vaccination Tracker - Track Your Baby's Immunization Schedule</title>
    <meta name="description" content="Free baby vaccination tracker with timeline view, multi-language support (English, Hindi, Marathi), and calendar integration. Track your baby's immunization schedule from birth to 10+ years with detailed vaccine information.">
    <meta name="keywords" content="baby vaccination, immunization tracker, vaccine schedule, baby health, pediatric vaccines, vaccination calendar, Indian vaccination schedule, baby care, child immunization, vaccine reminder">
    <meta name="author" content="Baby Vaccination Tracker">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English, Hindi, Marathi">
    
    <!-- Open Graph Meta Tags for Social Media -->
    <meta property="og:title" content="Baby Vaccination Tracker - Track Your Baby's Immunization Schedule">
    <meta property="og:description" content="Free baby vaccination tracker with timeline view, multi-language support, and calendar integration. Never miss a vaccine appointment!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kiran-badave.github.io/baby-vaccination-checklist/">
    <meta property="og:image" content="https://kiran-badave.github.io/baby-vaccination-checklist/og-image.png">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Baby Vaccination Tracker">
    <meta name="twitter:description" content="Free baby vaccination tracker with timeline view and multi-language support">
    <meta name="twitter:image" content="https://kiran-badave.github.io/baby-vaccination-checklist/og-image.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://kiran-badave.github.io/baby-vaccination-checklist/">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👶</text></svg>">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Structured Data for Search Engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Baby Vaccination Tracker",
      "description": "Track your baby's vaccination schedule with timeline view, multi-language support, and calendar integration",
      "url": "https://kiran-badave.github.io/baby-vaccination-checklist/",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Timeline and List Views",
        "Multi-language Support (English, Hindi, Marathi)",
        "Calendar Integration (ICS Export)",
        "Custom Vaccine Addition",
        "Detailed Vaccine Information",
        "Local Data Storage",
        "Data Export/Import"
      ],
      "inLanguage": ["en", "hi", "mr"],
      "audience": {
        "@type": "PeopleAudience",
        "audienceType": "Parents, Caregivers, Pediatricians"
      }
    }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1 id="appTitle"><i class="fas fa-baby"></i> Baby Vaccination Tracker</h1>
                    <p class="subtitle" id="appSubtitle"><i class="fas fa-heart"></i> Track your baby's vaccination schedule with ease</p>
                </div>
                <div class="language-selector">
                    <label for="languageSelect" id="languageLabel"><i class="fas fa-language"></i> Language:</label>
                    <select id="languageSelect" onchange="app.changeLanguage(this.value)">
                        <option value="en">🇬🇧 English</option>
                        <option value="hi">🇮🇳 हिंदी (Hindi)</option>
                        <option value="mr">🇮🇳 मराठी (Marathi)</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="setup-section" id="setupSection">
            <h2 id="setupProfileTitle"><i class="fas fa-user-plus"></i> Setup Baby Profile</h2>
            <div class="form-group">
                <label for="babyName" id="babyNameLabel"><i class="fas fa-baby-carriage"></i> Baby's Name:</label>
                <input type="text" id="babyName" placeholder="Enter baby's name">
            </div>
            <div class="form-group">
                <label for="babyDOB" id="babyDOBLabel"><i class="fas fa-birthday-cake"></i> Date of Birth:</label>
                <input type="date" id="babyDOB">
            </div>
            <div class="form-group">
                <label for="vaccineType" id="vaccineTypeLabel"><i class="fas fa-syringe"></i> Vaccine Type Preference:</label>
                <select id="vaccineType">
                    <option value="pentaxim" id="pentaximOption">💉 Pentaxim (Less pain, fewer injections)</option>
                    <option value="pentavalent" id="pentavalentOption">💰 Pentavalent (More affordable)</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="app.setupProfile()" id="saveProfileBtn"><i class="fas fa-save"></i> Save Profile</button>
        </div>

        <div class="profile-section" id="profileSection" style="display: none;">
            <div class="profile-card">
                <h3 id="profileName"></h3>
                <p id="profileDOB"></p>
                <p id="profileVaccineType"></p>
                <button class="btn btn-secondary" onclick="app.editProfile()" id="editProfileBtn"><i class="fas fa-edit"></i> Edit Profile</button>
            </div>
        </div>

        <div class="actions-section" id="actionsSection" style="display: none;">
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="app.exportToCalendar()" id="exportCalendarBtn"><i class="fas fa-calendar-alt"></i> Export to Calendar</button>
                <button class="btn btn-secondary" onclick="app.exportData()" id="exportDataBtn"><i class="fas fa-download"></i> Export Data</button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" id="importDataBtn"><i class="fas fa-upload"></i> Import Data</button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="app.importData(event)">
                <button class="btn btn-success" onclick="app.showCustomVaccineModal()" id="addCustomVaccineBtn"><i class="fas fa-plus-circle"></i> Add Custom Vaccine</button>
                <button class="btn btn-danger" onclick="app.clearData()" id="clearDataBtn"><i class="fas fa-trash-alt"></i> Clear All Data</button>
            </div>
        </div>

        <div class="schedule-section" id="scheduleSection" style="display: none;">
            <h2 id="scheduleTitle"><i class="fas fa-clipboard-list"></i> Vaccination Schedule</h2>
            
            <div class="view-toggle">
                <button class="view-btn active" onclick="app.switchView('timeline')" id="timelineViewBtn">
                    <i class="fas fa-stream"></i> Timeline View
                </button>
                <button class="view-btn" onclick="app.switchView('list')" id="listViewBtn">
                    <i class="fas fa-list"></i> List View
                </button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" onclick="app.filterSchedule('all')" id="filterAll"><i class="fas fa-globe"></i> All</button>
                <button class="filter-btn" onclick="app.filterSchedule('pending')" id="filterPending"><i class="fas fa-clock"></i> Pending</button>
                <button class="filter-btn" onclick="app.filterSchedule('completed')" id="filterCompleted"><i class="fas fa-check-circle"></i> Completed</button>
                <button class="filter-btn" onclick="app.filterSchedule('upcoming')" id="filterUpcoming"><i class="fas fa-bell"></i> Upcoming</button>
            </div>

            <div id="timelineView" class="timeline-container"></div>
            <div id="listView" class="list-container" style="display: none;"></div>
        </div>

        <footer>
            <p id="footerTip"><i class="fas fa-lightbulb"></i> <strong>Tip:</strong> Vaccines can be taken ±5–7 days safely. Always consult your pediatrician.</p>
        </footer>
    </div>

    <!-- Custom Vaccine Modal -->
    <div id="customVaccineModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="app.closeCustomVaccineModal()">&times;</span>
            <h2 id="customVaccineTitle"><i class="fas fa-plus-square"></i> Add Custom Vaccine</h2>
            <div class="form-group">
                <label for="customVaccineName" id="customVaccineNameLabel"><i class="fas fa-syringe"></i> Vaccine Name:</label>
                <input type="text" id="customVaccineName" placeholder="e.g., Flu Shot">
            </div>
            <div class="form-group">
                <label for="customVaccineAge" id="customVaccineAgeLabel"><i class="fas fa-calendar"></i> Age/Time:</label>
                <input type="text" id="customVaccineAge" placeholder="e.g., 8 months">
            </div>
            <div class="form-group">
                <label for="customVaccineWeeks" id="customVaccineWeeksLabel"><i class="fas fa-hourglass-half"></i> Weeks from birth:</label>
                <input type="number" id="customVaccineWeeks" placeholder="e.g., 35">
            </div>
            <div class="form-group">
                <label for="customVaccineDescription" id="customVaccineDescriptionLabel"><i class="fas fa-info-circle"></i> Description/Purpose:</label>
                <textarea id="customVaccineDescription" rows="3" placeholder="What is this vaccine for?"></textarea>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="customVaccineMandatory">
                    <span id="customVaccineMandatoryLabel"><i class="fas fa-exclamation-circle"></i> Mandatory</span>
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="app.addCustomVaccine()" id="addVaccineBtn"><i class="fas fa-check"></i> Add Vaccine</button>
                <button class="btn btn-secondary" onclick="app.closeCustomVaccineModal()" id="cancelBtn"><i class="fas fa-times"></i> Cancel</button>
            </div>
        </div>
    </div>

    <!-- Vaccine Details Modal -->
    <div id="vaccineDetailsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="app.closeVaccineDetailsModal()">&times;</span>
            <h2 id="vaccineDetailsTitle"><i class="fas fa-book-medical"></i> Vaccine Details</h2>
            <div id="vaccineDetailsContent"></div>
            <button class="btn btn-secondary" onclick="app.closeVaccineDetailsModal()" id="closeDetailsBtn"><i class="fas fa-times-circle"></i> Close</button>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
